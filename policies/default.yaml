policy: openoms-default
version: 2026-04-25
description: Default Hearthline sourcing policy

weights:
  shipping_cost: 1.0
  split_penalty: 5.0
  capacity_pressure: 1.5
  late_promise_penalty: 10.0

radius_miles: 5000
solver_time_limit_ms: 200

# Relaxation cascade used by relax_and_source.
# Steps tried in order; first feasible solution wins.
relaxation_cascade:
  radius_miles: [150, 500, 1500, 5000]
